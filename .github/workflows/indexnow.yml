name: IndexNow

on:
  push:
    branches: [main]
    paths:
      - "src/content/research/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Submit research URLs to IndexNow
        run: node scripts/indexnow.mjs
